<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="วันในสัปดาห์">
  <defs>
    <linearGradient id="calBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a7d4ff"/>
      <stop offset="1" stop-color="#4f97f5"/>
    </linearGradient>
  </defs>
  <ellipse cx="32" cy="57" rx="19" ry="3.5" fill="#000" opacity="0.10"/>
  <!-- calendar body -->
  <rect x="10" y="14" width="44" height="40" rx="8" fill="#eef5ff" stroke="#2f6bc4" stroke-width="3"/>
  <!-- header band -->
