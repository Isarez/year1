    <rect x="14" y="31" width="6" height="6" rx="2"/>
    <rect x="22" y="31" width="6" height="6" rx="2"/>
    <rect x="30" y="31" width="6" height="6" rx="2"/>
    <rect x="38" y="31" width="6" height="6" rx="2"/>
    <rect x="46" y="31" width="4" height="6" rx="2"/>
    <rect x="14" y="41" width="6" height="6" rx="2"/>
    <rect x="22" y="41" width="6" height="6" rx="2"/>
  </g>
  <!-- highlighted day -->
  <rect x="29" y="40" width="9" height="9" rx="2.5" fill="#ffd54f" stroke="#2f6bc4" stroke-width="2"/>
  <path d="M31.5 44.5l1.6 1.6 2.6-3" fill="none" stroke="#2f6bc4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
