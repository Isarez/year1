  <circle cx="25.2" cy="30.4" r="4.2" fill="#3A2416"/><circle cx="38.8" cy="30.4" r="4.2" fill="#3A2416"/>
  <circle cx="26.8" cy="28.8" r="1.4" fill="#fff"/><circle cx="40.4" cy="28.8" r="1.4" fill="#fff"/>
  <!-- brow -->
