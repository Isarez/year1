  <!-- mouth ring -->
  <path d="M42 21c3 1 5 5 5 11s-2 10-5 11z" fill="#eaf4ff" stroke="#2f6bc4" stroke-width="2.6" stroke-linejoin="round"/>
  <!-- back rim -->
  <rect x="10" y="26" width="6" height="12" rx="3" fill="url(#ls2G)" stroke="#2f6bc4" stroke-width="3"/>
  <!-- highlight -->
  <path d="M18 27l18-6.6v3.4L18 30z" fill="#fff" opacity="0.28"/>
  <!-- handle -->
  <path d="M24 44v6a4 4 0 0 0 8 0v-3" fill="none" stroke="#2f6bc4" stroke-width="3" stroke-linecap="round"/>

  <!-- sound waves -->
  <g fill="none" stroke="#4f97f5" stroke-width="3" stroke-linecap="round">
    <path d="M52 22a16 16 0 0 1 0 20"/>
    <path d="M57 17a25 25 0 0 1 0 30"/>
