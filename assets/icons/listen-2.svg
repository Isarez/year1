<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ฟังคำศัพท์ 2">
  <defs>
    <linearGradient id="ls2G" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a7d4ff"/>
      <stop offset="1" stop-color="#4f97f5"/>
    </linearGradient>
    <linearGradient id="ls2H" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe27a"/>
      <stop offset="1" stop-color="#ffc531"/>
    </linearGradient>
  </defs>
  <ellipse cx="32" cy="56" rx="18" ry="3.5" fill="#000" opacity="0.10"/>

  <!-- megaphone body -->
  <path d="M14 26l24-9a3 3 0 0 1 4 2.8v24.4a3 3 0 0 1-4 2.8l-24-9z"
