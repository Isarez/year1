<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="พฤติกรรมดี-ไม่ดี">
  <defs>
    <linearGradient id="behGood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9be9b7"/>
      <stop offset="1" stop-color="#3fc072"/>
    </linearGradient>
    <linearGradient id="behBad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb0b0"/>
      <stop offset="1" stop-color="#f56a6a"/>
    </linearGradient>
  </defs>
  <ellipse cx="32" cy="56" rx="19" ry="3.5" fill="#000" opacity="0.10"/>

  <!-- sad face (behind, right) -->
  <circle cx="42" cy="26" r="15" fill="url(#behBad)" stroke="#d84a4a" stroke-width="3"/>
  <g fill="#7a2222">
    <circle cx="40" cy="23" r="1.8"/>
    <circle cx="47" cy="23" r="1.8"/>
  </g>
  <path d="M39 33c2-2 6-2 8 0" fill="none" stroke="#7a2222" stroke-width="2.4" stroke-linecap="round"/>

  <!-- happy face (front, left) -->
  <circle cx="24" cy="30" r="17" fill="url(#behGood)" stroke="#2c9457" stroke-width="3"/>
  <path d="M14 20a17 17 0 0 1 9-5" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <g fill="#1f6b3f">
    <circle cx="19" cy="27" r="2"/>
    <circle cx="29" cy="27" r="2"/>
  </g>
  <path d="M18 34c3 3.5 9 3.5 12 0" fill="none" stroke="#1f6b3f" stroke-width="2.8" stroke-linecap="round"/>

  <!-- check badge -->
  <circle cx="36" cy="45" r="7" fill="#ffd54f" stroke="#2c9457" stroke-width="2.4"/>
  <path d="M33 45l2.5 2.5 4-5" fill="none" stroke="#2c9457" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
