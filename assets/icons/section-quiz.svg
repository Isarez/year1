<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="คำถาม-คำตอบ">
  <defs>
    <linearGradient id="sqG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3b0"/>
      <stop offset="1" stop-color="#ffc53d"/>
    </linearGradient>
    <linearGradient id="sqP" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5f0e8"/>
    </linearGradient>
  </defs>
  <ellipse cx="32" cy="58" rx="16" ry="3" fill="#000" opacity="0.09"/>
  <!-- paper -->
  <rect x="14" y="10" width="30" height="40" rx="5" fill="url(#sqP)" stroke="#d4a017" stroke-width="2.5"/>
  <rect x="16" y="12" width="6" height="36" rx="3" fill="#fff" opacity="0.35"/>
  <!-- lines -->
  <line x1="20" y1="20" x2="38" y2="20" stroke="#d4a017" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="27" x2="38" y2="27" stroke="#d4a017" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="34" x2="32" y2="34" stroke="#d4a017" stroke-width="2" stroke-linecap="round"/>
  <!-- pencil -->
  <g transform="rotate(-35 44 36)">
    <rect x="39" y="18" width="8" height="28" rx="2" fill="url(#sqG)" stroke="#d4a017" stroke-width="2"/>
    <polygon points="39,46 47,46 43,54" fill="#f5c842" stroke="#d4a017" stroke-width="1.5" stroke-linejoin="round"/>
    <polygon points="41,52 45,52 43,56" fill="#e8d5b0"/>
