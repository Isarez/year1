  <!-- pad highlight -->
  <ellipse cx="26" cy="42" rx="4.5" ry="3.2" fill="#fff" opacity="0.35"/>

  <!-- toes -->
  <g stroke="#d34a80" stroke-width="3">
    <ellipse cx="15" cy="31" rx="5.5" ry="7" fill="url(#pawToe)"/>
    <ellipse cx="25.5" cy="21" rx="5.8" ry="7.4" fill="url(#pawToe)"/>
    <ellipse cx="38.5" cy="21" rx="5.8" ry="7.4" fill="url(#pawToe)"/>
    <ellipse cx="49" cy="31" rx="5.5" ry="7" fill="url(#pawToe)"/>
  </g>
  <!-- toe highlights -->
  <g fill="#fff" opacity="0.35">
    <ellipse cx="13.5" cy="29" rx="1.8" ry="2.4"/>
    <ellipse cx="24" cy="18.5" rx="1.9" ry="2.6"/>
    <ellipse cx="37" cy="18.5" rx="1.9" ry="2.6"/>
    <ellipse cx="47.5" cy="29" rx="1.8" ry="2.4"/>
  </g>

  <!-- little heart accent on pad -->
  <path d="M32 45c-1.4-2.2-4.4-1.2-4.4 1 0 2 2.6 3.4 4.4 4.8 1.8-1.4 4.4-2.8 4.4-4.8 0-2.2-3-3.2-4.4-1z"
        fill="#fff" opacity="0.55"/>
</svg>
