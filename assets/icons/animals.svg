<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="สัตว์และที่อยู่">
  <defs>
    <linearGradient id="pawG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb3d1"/>
      <stop offset="1" stop-color="#f56aa0"/>
    </linearGradient>
    <linearGradient id="pawToe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff9ec4"/>
      <stop offset="1" stop-color="#ef5591"/>
    </linearGradient>
  </defs>
  <ellipse cx="32" cy="58" rx="18" ry="3.2" fill="#000" opacity="0.10"/>

  <!-- main pad -->
  <path d="M32 33c8.5 0 15 6.5 15 13.5 0 5.6-6.7 6.5-15 6.5s-15-.9-15-6.5C17 39.5 23.5 33 32 33z"
