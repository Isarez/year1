    <line x1="17.6" y1="35" x2="17.6" y2="50"/>
    <line x1="24.7" y1="35" x2="24.7" y2="50"/>
    <line x1="31.8" y1="35" x2="31.8" y2="50"/>
    <line x1="38.9" y1="35" x2="38.9" y2="50"/>
    <line x1="46" y1="35" x2="46" y2="50"/>
  </g>

  <!-- คีย์ดำ -->
  <g fill="#2b2733">
