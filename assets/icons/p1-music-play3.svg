<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="เกมดนตรี 3">
  <defs>
    <linearGradient id="mus3Body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E5A575"/>
      <stop offset="1" stop-color="#D08A5E"/>
    </linearGradient>
  </defs>
  <ellipse cx="32" cy="58" rx="22" ry="3.5" fill="#000" opacity="0.10"/>

  <!-- ตัวเปียโน -->
  <rect x="7" y="24" width="50" height="30" rx="6" fill="url(#mus3Body)" stroke="#B57145" stroke-width="2.5"/>
  <rect x="10.5" y="34" width="43" height="17" rx="3" fill="#FFFDF7" stroke="#B57145" stroke-width="1.6"/>

  <!-- คีย์ขาว (ไม่มีแถบสี = โจทย์ไม่มีตัวโน้ตกำกับ) -->
