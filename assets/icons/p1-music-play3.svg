    <line x1="47.6" y1="27.6" x2="55" y2="35" stroke="#8A5230" stroke-width="4.2" stroke-linecap="round"/>
    <text x="40" y="25" font-size="13" font-weight="800" text-anchor="middle" fill="#8A5230" font-family="sans-serif">?</text>
  </g>
  <circle cx="53" cy="53" r="9.5" fill="#fff" stroke="#A85796" stroke-width="2.5"/>
  <text x="53" y="56.5" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#A85796" text-anchor="middle">ป.1</text>
