<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="เกมฟังคำศัพท์">
  <defs>
    <linearGradient id="lsG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c7b3ff"/>
      <stop offset="1" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="lsC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8f7bf0"/>
      <stop offset="1" stop-color="#5a49d6"/>
    </linearGradient>
  </defs>
  <ellipse cx="30" cy="58" rx="17" ry="3" fill="#000" opacity="0.09"/>
  <!-- speaker cone -->
  <path d="M10 26 h8 l12-11 v34 l-12-11 h-8 a3 3 0 0 1-3-3 v-6 a3 3 0 0 1 3-3 z"
        fill="url(#lsG)" stroke="#4a3ab0" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M18 27 l10-9 v28 l-10-9 z" fill="#fff" opacity="0.18"/>
  <!-- sound waves -->
  <path d="M37 25 Q41 32 37 39" stroke="url(#lsC)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M43 20 Q49 32 43 44" stroke="url(#lsC)" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.75"/>
  <path d="M49 15 Q57 32 49 49" stroke="url(#lsC)" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- music note sparkle -->
  <circle cx="52" cy="10" r="1.8" fill="#ffd54f"/>
  <circle cx="57" cy="20" r="1.3" fill="#ffd54f" opacity="0.8"/>
</svg>
